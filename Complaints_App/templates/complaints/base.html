<!DOCTYPE html>
<html lang="en">
{% load static %}

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complaint Portal</title>
  <link rel="stylesheet" href="{% static 'complaints/css/style.css' %}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>

<body>
  <div class="d-flex">
    <!-- Sidebar -->
    <nav class="sidebar bg-dark text-white p-3" style="width:220px; min-height:100vh;">
      <h4 class="mb-4">Comp<span class="text-primary">Resolve</span></h4>
      <ul class="nav flex-column">
        <li class="nav-item"><a href="{% url 'user_home' %}" class="nav-link text-white">Home</a></li>
        <li class="nav-item"><a href="#" class="nav-link text-white">Settlement</a></li>
        <li class="nav-item"><a href="#" class="nav-link text-white">Payments</a></li>
        <li class="nav-item"><a href="#" class="nav-link text-white">Transactions</a></li>
        <li class="nav-item"><a href="{% url 'user_home' %}" class="nav-link text-white active">Complaints</a></li>
        <li class="nav-item"><a href="#" class="nav-link text-white">Help centre</a></li>
      </ul>
    </nav>

    <!-- Main Content -->
    <div class="flex-grow-1">
      <!-- Top Bar -->

      <!-- Top Bar -->

      <header class="bg-white d-flex justify-content-end align-items-center p-3 border-bottom">
        <span class="me-3">
          <i class="bi bi-envelope fs-5"></i>
        </span>

        {% if user.is_authenticated %}
        <div class="dropdown">
          <button class="btn btn-light d-flex align-items-center" type="button" id="userMenuButton"
            data-bs-toggle="dropdown" aria-expanded="false">
            <span class="rounded-circle bg-primary text-white p-2 me-2">
              <i class="bi bi-person"></i>
            </span>
            <span class="fw-semibold">{{ request.user.name }} ({{ request.user.groups.0|title|default:"Customer"
              }})</span>
            <i class="bi bi-caret-down-fill ms-2"></i>
          </button>

          <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userMenuButton">
            <a href="#">Profile</a>
            <li>
              <form method="POST" action="{% url 'logout' %}">
                {% csrf_token %}
                <button type="submit" class="btn btn-link dropdown-item p-0">Logout</button>
              </form>

            </li>
          </ul>
        </div>
        {% else %}
        <a href="{% url 'login' %}">
          <i class="bi bi-box-arrow-in-right me-1"></i> Login
        </a>
        {% endif %}


      </header>


      <!-- Dynamic Content -->
      <main class="p-4 bg-light" style="min-height:100vh;">
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'complaints/js/complaints.js' %}"></script>
</body>

</html>
